          <h2 class="post-block__title">VSCodeのターミナルのPATH環境変数の順序がおかしい</h2>
          <time class="post-block__date" datetime="2022-04-21T00:00:00.000Z">2022年4月21日</time>
        </div>
        <p>あるとき、<a href="https://code.visualstudio.com/">Visual Studio Code</a>のターミナルと macOS に搭載されている Terminal.app では PATH 環境変数の値の順序が異なることに気がついた。</p>
<p>以下の設定をすると自身が意図していた値に修正できた。</p>
<pre class="language-json"><code class="language-json"><span class="token punctuation">{</span><br>  <span class="token property">"terminal.integrated.inheritEnv"</span><span class="token operator">:</span> <span class="token boolean">false</span><br><span class="token punctuation">}</span></code></pre>
<p>挙動についての詳細は<a href="https://code.visualstudio.com/updates/v1_36#_launch-terminals-with-clean-environments">Launch terminals with clean environments</a>に記載されている。</p>
